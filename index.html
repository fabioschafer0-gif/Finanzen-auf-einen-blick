function autoCategory(note,type){
  const n=(note||"").toLowerCase();
  if(type==="income"){
    if(/gehalt|lohn|salary|payroll/.test(n))       return "Gehalt";
    if(/nebeneinkommen|freelance|honorar/.test(n)) return "Nebeneinkommen";
    if(/bonus|prämie|gratifikation/.test(n))       return "Bonus";
    return "Sonstiges";
  }
  if(/rewe|lidl|aldi|edeka|penny|netto|kaufland|dm-|rossmann|müller|bäcker|metzger|supermarkt|lebensmittel/.test(n)) return "Lebensmittel";
  if(/miete|warmmiete|nebenkosten|hausgeld|strom|gas |wasser |gez|rundfunk/.test(n))                               return "Miete / Wohnen";
  if(/tankstelle|aral|shell|bp |total |esso|jet |db |hvv|mvv|bvg|rnv|sbahn|ubahn|öpnv|parken|parkhaus/.test(n))   return "Transport";
  if(/versicherung|allianz|huk|axa|generali|ergo|signal|debeka/.test(n))                                          return "Versicherungen";
  if(/netflix|spotify|amazon prime|disney|apple|google play|youtube|kino|konzert|theater|steam|gaming/.test(n))   return "Freizeit";
  if(/zalando|h&m|zara|c&a|primark|about you|kleidung|schuhe|mode/.test(n))                                      return "Kleidung";

  if(/apotheke|arzt|krankenhaus|medikament|zahnarzt|physiotherapie|optiker/.test(n))                              return "Gesundheit";
  if(/ikea|bauhaus|obi |hornbach|haushalt|möbel|media markt|saturn/.test(n))                                      return "Haushalt";
  return "Sonstiges";
}

// ── CSV PARSE ────────────────────────────────────────────────────
function parseCSV(text){
  const lines=text.replace(/\r/g,"").split("\n").filter(l=>l.trim());
  const sep=lines[0].split(";").length>lines[0].split(",").length?";":",";
  function splitLine(l){const res=[];let cur="",inQ=false;for(let ch of l){if(ch==='"'){inQ=!inQ;}else if(ch===sep&&!inQ){res.push(cur.trim());cur="";}else{cur+=ch;}}res.push(cur.trim());return res;}
  const headers=splitLine(lines[0]).map(h=>h.replace(/"/g,"").trim());
  const rows=lines.slice(1).map(l=>{const cells=splitLine(l);return headers.reduce((o,h,i)=>{o[h]=(cells[i]||"").replace(/"/g,"").trim();return o;},{});}).filter(r=>Object.values(r).some(v=>v));
  return{headers,rows};
}
function parseAmount(s=""){
  const c=s.replace(/[€$\s]/g,"");
  if(c.includes(",")&&c.includes("."))return parseFloat(c.replace(/\./g,"").replace(",","."));
  if(c.includes(","))return parseFloat(c.replace(",","."));
  return parseFloat(c);
}
function parseDate(s=""){
  const dm=s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(dm)return`${dm[3]}-${dm[2].padStart(2,"0")}-${dm[1].padStart(2,"0")}`;
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);
  return todayStr();
}
function autoDetect(headers){
  return{
    date:  headers.find(h=>/datum|date|buchung|wert|time/i.test(h))||"",
    amount:headers.find(h=>/betrag|amount|summe|kredit|soll|haben/i.test(h))||"",
    note:  headers.find(h=>/beschreibung|verwendung|reference|typ|type|name|empf/i.test(h))||"",
  };
}

// ── MINI LINE CHART (SVG) ────────────────────────────────────────
function MiniLineChart({prices,height=70}){
  if(!prices||prices.length<2)return<div style={{height,background:C.bg,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:11,color:C.muted}}>Lädt Chart…</span></div>;
  const valid=prices.filter(p=>p!=null&&!isNaN(p));
  if(valid.length<2)return<div style={{height,background:C.bg,borderRadius:8}}/>;
  const W=300,H=height;
  const min=Math.min(...valid)*0.998;
  const max=Math.max(...valid)*1.002;
  const range=max-min||1;
  const pts=valid.map((p,i)=>[(i/(valid.length-1))*W, H-((p-min)/range)*(H-6)-3]);
  const line=pts.map(([x,y])=>`${x},${y}`).join(" ");
  const area=`${pts[0][0]},${H} ${line} ${pts[pts.length-1][0]},${H}`;
  const isPos=valid[valid.length-1]>=valid[0];
  const stroke=isPos?C.green:C.red;
  const fill=isPos?"#22c55e18":"#f8717118";
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="none">
      <polygon points={area} fill={fill}/>
      <polyline points={line} fill="none" stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

      catch{
        // CORS-Fallback
        const proxy=`https://corsproxy.io/?${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?range=3mo&interval=1wk`)}`;
        json=await tryFetch(proxy);
      }
      const r=json.chart.result[0];
      const cur=r.meta.regularMarketPrice;
      const closes=r.indicators.quote[0].close;
      setPriceData(p=>({...p,[ticker]:cur}));
      setChartData(p=>({...p,[ticker]:closes}));
      setLastUpdated(new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}));
    }catch(e){
      console.error("Kurs-Fehler:",ticker,e);
      setPriceData(p=>({...p,[ticker]:null}));
    }
    setPriceLoading(p=>({...p,[ticker]:false}));
  },[]);

  const fetchAllPrices=useCallback(()=>{
    depot.forEach(e=>fetchPrice(e.ticker));
  },[depot,fetchPrice]);

  useEffect(()=>{
    if(depot.length>0) fetchAllPrices();
  },[depot.length]);

  // ── BUCHUNGEN ────────────────────────────────────────────────
  const addEntry=()=>{
    if(!user){setShowLoginModal(true);return;}
    if(!form.amount||!form.category)return;
    const e={...form,id:uid(),amount:parseFloat(form.amount)};
    setEntries(prev=>[...prev,e]);
    setShowAdd(false);
    setForm({type:"expense",category:"",amount:"",note:"",date:todayStr()});
    pop(e.type==="income"?"✅ Einnahme gespeichert":"✅ Ausgabe gespeichert");
    sb.from('entries').insert({id:e.id,user_id:user.id,type:e.type,category:e.category,amount:e.amount,note:e.note||"",date:e.date});
  };
  const delEntry=id=>{
    setEntries(prev=>prev.filter(e=>e.id!==id));
    pop("🗑️ Gelöscht");
    sb.from('entries').delete().eq('id',id);
  };

  // ── ZIELE ────────────────────────────────────────────────────
  const openNew=()=>{setEditId(null);setGForm({name:"",icon:"🏠",color:"#c9a227",target:"",saved:""});setShowGoalDlg(true);};
  const openEdit=g=>{setEditId(g.id);setGForm({name:g.name,icon:g.icon,color:g.color,target:String(g.target),saved:String(g.saved)});setShowGoalDlg(true);};
  const saveGoal=()=>{
    if(!user){setShowLoginModal(true);return;}
    if(!gForm.name||!gForm.target)return;
    if(editId){
      const upd={id:editId,...gForm,target:parseFloat(gForm.target),saved:gForm.saved!==""?parseFloat(gForm.saved):goals.find(g=>g.id===editId)?.saved||0};
      setGoals(prev=>prev.map(g=>g.id===editId?upd:g));
      sb.from('goals').upsert({id:upd.id,user_id:user.id,name:upd.name,icon:upd.icon,color:upd.color,target:upd.target,saved:upd.saved});
      pop("✅ Ziel aktualisiert");
    } else {
      const ng={id:"g"+uid(),...gForm,target:parseFloat(gForm.target),saved:gForm.saved?parseFloat(gForm.saved):0};
      setGoals(prev=>[...prev,ng]);
      sb.from('goals').insert({id:ng.id,user_id:user.id,name:ng.name,icon:ng.icon,color:ng.color,target:ng.target,saved:ng.saved});
      pop("🎯 Neues Ziel!");
    }
    setShowGoalDlg(false);
  };
  const delGoal=id=>{
    if(goals.length<=1){pop("❌ Mindestens ein Ziel");return;}
    setGoals(prev=>prev.filter(g=>g.id!==id));
    sb.from('goals').delete().eq('id',id);
    pop("🗑️ Ziel gelöscht");
  };
  const addSaved=(id,delta)=>{
    setGoals(prev=>prev.map(g=>{
      if(g.id!==id)return g;
      const ns=Math.max(0,g.saved+delta);
      sb.from('goals').update({saved:ns}).eq('id',id);
      return{...g,saved:ns};
    }));
    pop(`+€${fmtShort(delta)} eingetragen 💰`);
  };

  // ── DEPOT ────────────────────────────────────────────────────
  const openNewDepot=()=>{setEditDepotId(null);setDForm({name:"",ticker:"",units:"",avgPrice:""});setShowDepotDlg(true);};
  const openEditDepot=etf=>{setEditDepotId(etf.id);setDForm({name:etf.name,ticker:etf.ticker,units:String(etf.units),avgPrice:String(etf.avgPrice)});setShowDepotDlg(true);};
  const saveDepotEntry=()=>{
    if(!user){setShowLoginModal(true);return;}
    if(!dForm.name||!dForm.ticker||!dForm.units||!dForm.avgPrice)return;
    const entry={name:dForm.name,ticker:dForm.ticker.toUpperCase().trim(),units:parseFloat(dForm.units),avgPrice:parseFloat(String(dForm.avgPrice).replace(",","."))};
    if(editDepotId){
      const upd={...entry,id:editDepotId};
      setDepot(prev=>prev.map(e=>e.id===editDepotId?upd:e));
      sb.from('depot').upsert({id:upd.id,user_id:user.id,name:upd.name,ticker:upd.ticker,units:upd.units,avg_price:upd.avgPrice});
      pop("✅ Position aktualisiert");
    } else {
      const ni={id:"d"+uid(),...entry};
      setDepot(prev=>[...prev,ni]);
      sb.from('depot').insert({id:ni.id,user_id:user.id,name:ni.name,ticker:ni.ticker,units:ni.units,avg_price:ni.avgPrice});
      pop("💹 ETF hinzugefügt!");
    }
    setShowDepotDlg(false);
    fetchPrice(entry.ticker);
  };
  const delDepotEntry=id=>{
    setDepot(prev=>prev.filter(e=>e.id!==id));
    sb.from('depot').delete().eq('id',id);
    pop("🗑️ Position gelöscht");
  };

  const depotTotal  = depot.reduce((s,e)=>s+(priceData[e.ticker]??e.avgPrice)*e.units,0);
  const depotCost   = depot.reduce((s,e)=>s+e.avgPrice*e.units,0);
  const depotPnL    = depotTotal-depotCost;
  const depotPnLPct = depotCost>0?(depotPnL/depotCost)*100:0;

  // ── CSV ──────────────────────────────────────────────────────
  const handleFile=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{const{headers,rows}=parseCSV(ev.target.result);setCsvHeaders(headers);setCsvRaw(rows);setCsvMap(autoDetect(headers));setCsvStep("map");};
    reader.readAsText(file,"UTF-8");
  };
  const buildPreview=()=>{
    const prev=csvRaw.slice(0,5).map(row=>{
      const amt=parseAmount(row[csvMap.amount]||"0");
      if(isNaN(amt)||amt===0)return null;
      const note=row[csvMap.note]||"";
      const type=amt>=0?"income":"expense";
      return{date:parseDate(row[csvMap.date]||""),amount:Math.abs(amt),type,note,category:autoCategory(note,type)};
    }).filter(Boolean);
    setCsvPreview(prev);setCsvStep("preview");
  };
  const importAll=()=>{
    const newE=csvRaw.map(row=>{
      const amt=parseAmount(row[csvMap.amount]||"0");
      if(isNaN(amt)||amt===0)return null;
      const note=row[csvMap.note]||"";
      const type=amt>=0?"income":"expense";
      return{id:uid(),date:parseDate(row[csvMap.date]||""),amount:Math.abs(amt),type,note,category:autoCategory(note,type)};
    }).filter(Boolean);
    if(!user){setShowLoginModal(true);return;}
    setEntries(prev=>[...prev,...newE]);
    if(newE.length>0&&user){
      sb.from('entries').insert(newE.map(e=>({id:e.id,user_id:user.id,type:e.type,category:e.category,amount:e.amount,note:e.note||"",date:e.date})));
    }
    setShowImport(false);setCsvStep("upload");setCsvRaw([]);setCsvHeaders([]);
    pop(`✅ ${newE.length} Transaktionen importiert!`);
  };
  const resetImport=()=>{setCsvStep("upload");setCsvRaw([]);setCsvHeaders([]);if(fileRef.current)fileRef.current.value="";};

  const exportCSV=()=>{
    if(entries.length===0){pop("❌ Keine Buchungen vorhanden");return;}
    const bom="\ufeff";
    const headers=["Datum","Typ","Kategorie","Betrag","Notiz"];
    const rows=entries.map(e=>[
      e.date?e.date.split("-").reverse().join("."):"",
      e.type==="income"?"Einnahme":"Ausgabe",
      e.category||"",
      (e.type==="expense"?"-":"")+e.amount.toFixed(2).replace(".",","),
      e.note||""
    ]);
    const csv=bom+[headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(";")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`haushaltsbuch_${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    pop(`✅ ${entries.length} Buchungen exportiert!`);
  };

  const shiftMonth=d=>{const dt=new Date(month+"-01");dt.setMonth(dt.getMonth()+d);setMonth(dt.toISOString().slice(0,7));};
  const openImport=()=>{setShowImport(true);setCsvStep("upload");setShowDrawer(false);};

  const mv        = entries.filter(e=>e.date?.startsWith(month));
  const inc       = mv.filter(e=>e.type==="income").reduce((s,e)=>s+e.amount,0);
  const exp       = mv.filter(e=>e.type==="expense").reduce((s,e)=>s+e.amount,0);
  const bal       = inc-exp;
  const sparPct   = inc>0?(bal/inc)*100:null;
  const byCat     = mv.filter(e=>e.type==="expense").reduce((a,e)=>{a[e.category]=(a[e.category]||0)+e.amount;return a;},{});
  const catSorted = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const sortedMv  = [...mv].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const totalSaved  = goals.reduce((s,g)=>s+g.saved,0);
  const totalTarget = goals.reduce((s,g)=>s+g.target,0);
  const totalPct    = totalTarget>0?Math.min((totalSaved/totalTarget)*100,100):0;
  const gesamtVermoegen = totalSaved+depotTotal;

  // Gesamtportfolio-Chart: alle Positionen aufaddieren
  const combinedChartData = (() => {
    const all = depot
      .map(e => ({prices: chartData[e.ticker], units: e.units}))
      .filter(e => e.prices && e.prices.length > 1);
    if (all.length === 0) return null;
    const minLen = Math.min(...all.map(e => e.prices.length));
    const combined = [];
    for (let i = 0; i < minLen; i++) {
      let total = 0; let valid = true;
      for (const {prices, units} of all) {
        if (prices[i] == null || isNaN(prices[i])) { valid = false; break; }
        total += prices[i] * units;
      }
      combined.push(valid ? total : null);
    }
    const filtered = combined.filter(v => v != null);
    return filtered.length > 1 ? combined : null;
  })();

  if(authLoading)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontSize:18}}>⏳ Verbinde...</div>;

  if(loading)return<div style={{background:C.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,fontSize:18}}>⏳ Lade Daten...</div>;

  const sidebarProps={tab,bal,inc,exp,month,goals,totalSaved,totalTarget,depotTotal,
    onNav:id=>{setTab(id);setShowDrawer(false);},
    onImport:openImport,
    onExport:()=>{setShowDrawer(false);exportCSV();}
  };

  return<div style={{background:C.bg,minHeight:"100vh",color:C.text}}>

    {/* TOAST */}
    {toast&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:"#1a2a40",border:`1px solid ${C.border}`,borderRadius:12,padding:"11px 22px",color:C.text,fontWeight:600,fontSize:13,zIndex:1100,whiteSpace:"nowrap",boxShadow:"0 4px 24px rgba(0,0,0,0.5)"}}>{toast}</div>}

    {/* ── HEADER ── */}
    <div style={{background:C.card,borderBottom:`1px solid ${C.border}`,padding:isMobile?"16px 16px 14px":"18px 28px 16px"}}>
      <div style={{maxWidth:isMobile?480:1200,margin:"0 auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%"}}>
          <div style={{display:"flex",alignItems:"center"}}>
            {isMobile&&<button onClick={()=>setShowDrawer(true)} style={{background:"transparent",border:`1px solid ${C.border}`,width:40,height:40,borderRadius:10,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,padding:0,marginRight:12}}>
              <span style={{display:"block",width:16,height:2,background:C.gold,borderRadius:1}}/>
              <span style={{display:"block",width:12,height:2,background:C.gold,borderRadius:1}}/>
              <span style={{display:"block",width:16,height:2,background:C.gold,borderRadius:1}}/>
            </button>}
            <div>
              <div style={{fontSize:10,color:C.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>Mein</div>
              <div style={{fontSize:isMobile?19:24,fontWeight:900,letterSpacing:-0.5}}>Haushaltsbuch</div>
            </div>
          </div>
          </div>
          {isMobile&&<div>
            {user
              ?<button onClick={()=>sb.auth.signOut()} style={{width:36,height:36,borderRadius:"50%",background:C.gold,border:"none",fontSize:14,fontWeight:900,color:"#080e1a",cursor:"pointer"}}>{(user.email||user.user_metadata?.user_name||"U")[0].toUpperCase()}</button>
              :<button onClick={()=>setShowLoginModal(true)} style={{background:C.gold,border:"none",color:"#080e1a",fontSize:12,padding:"8px 14px",borderRadius:9,cursor:"pointer",fontWeight:800}}>Anmelden</button>
            }
          </div>}
          {!isMobile&&<div style={{display:"flex",gap:10}}>
            <button onClick={openImport} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.mutedLight,fontSize:13,padding:"8px 16px",borderRadius:9,cursor:"pointer",fontWeight:500}}>📂 Importieren</button>
            <button onClick={exportCSV}  style={{background:"transparent",border:`1px solid ${C.green}55`,color:C.green,fontSize:13,padding:"8px 16px",borderRadius:9,cursor:"pointer",fontWeight:500}}>💾 Exportieren</button>
            {user
              ?<div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"6px 12px"}}>
                  <div style={{width:26,height:26,borderRadius:"50%",background:C.gold,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:"#080e1a"}}>{(user.email||user.user_metadata?.user_name||"U")[0].toUpperCase()}</div>
                  <span style={{fontSize:12,color:C.mutedLight,maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.user_metadata?.user_name||user.email}</span>
                </div>
                <button onClick={()=>sb.auth.signOut()} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,fontSize:12,padding:"8px 14px",borderRadius:9,cursor:"pointer",fontWeight:500}}>Abmelden</button>
              </div>
              :<button onClick={()=>setShowLoginModal(true)} style={{background:C.gold,border:"none",color:"#080e1a",fontSize:13,padding:"8px 18px",borderRadius:9,cursor:"pointer",fontWeight:800}}>👤 Anmelden</button>
            }
            <button onClick={openNew}    style={{background:C.gold,border:"none",color:"#080e1a",fontSize:13,padding:"8px 16px",borderRadius:9,cursor:"pointer",fontWeight:700}}>+ Neues Ziel</button>
          </div>}
        </div>

        {/* ── HEADER CARDS ── */}
        <div style={{display:"grid",gridTemplateColumns:depot.length>0&&!isMobile?"1fr 1fr":"1fr",gap:12}}>
          {/* Sparziele */}
          <div style={{background:C.bg,borderRadius:14,padding:"13px 16px",border:`1px solid ${C.border}`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:11,color:C.mutedLight}}>💰 Gesamt-Sparfortschritt</span>
              <span style={{fontSize:12,fontWeight:800,color:C.gold}}>{totalPct.toFixed(1)}%</span>
            </div>
            <div style={{height:10,background:C.border,borderRadius:5,overflow:"hidden",display:"flex",gap:1}}>
              {goals.map(g=>{const w=totalTarget>0?(g.saved/totalTarget)*100:0;return w>0?<div key={g.id} style={{height:"100%",width:`${w}%`,background:g.color,flexShrink:0}}/>:null;})}
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:"7px 20px",marginTop:10}}>
              {goals.map(g=><div key={g.id} style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:g.color}}/>
                <span style={{fontSize:11,color:C.mutedLight}}>{g.icon} {g.name}</span>
                <span style={{fontSize:11,color:g.color,fontWeight:700}}>€{fmtShort(g.saved)}</span>
              </div>)}

            <div style={{display:"flex",justifyContent:"space-between",marginTop:10,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
              <span style={{fontSize:11,color:C.green,fontWeight:800}}>€{totalSaved.toLocaleString("de-DE")} gespart</span>
              <span style={{fontSize:11,color:C.muted}}>Ziel: €{totalTarget.toLocaleString("de-DE")}</span>
            </div>
          </div>

          {/* Depot-Karte im Header */}
          {depot.length>0&&<div style={{background:C.bg,borderRadius:14,padding:"13px 16px",border:`1px solid ${C.blue}44`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:11,color:C.mutedLight}}>💹 ETF-Depot</span>
              <button onClick={fetchAllPrices} style={{background:"none",border:"none",color:C.blue,fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
                {Object.values(priceLoading).some(Boolean)
                  ?<span className="spin" style={{display:"inline-block"}}>⟳</span>
                  :"⟳ Update"}
              </button>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
              <span style={{fontSize:22,fontWeight:900,color:C.blue}}>€{fmtShort(depotTotal)}</span>
              <span style={{fontSize:13,fontWeight:700,color:depotPnL>=0?C.green:C.red}}>
                {fmtPct(depotPnLPct)} ({depotPnL>=0?"+":""}€{fmtShort(Math.abs(depotPnL))})
              </span>
            </div>
            <div style={{fontSize:10,color:C.muted}}>{depot.length} Positionen · Invest: €{fmtShort(depotCost)}</div>
            {lastUpdated&&<div style={{fontSize:9,color:C.muted,marginTop:4}}>Stand: {lastUpdated} Uhr</div>}
          </div>}
        </div>
      </div>
    </div>

    {/* ── BODY ── */}
    <div style={{display:"flex",maxWidth:isMobile?480:1200,margin:"0 auto"}}>

      {/* DESKTOP SIDEBAR */}
      {!isMobile&&<div style={{width:260,flexShrink:0,borderRight:`1px solid ${C.border}`,minHeight:"calc(100vh - 180px)",background:"#0b1422",overflowY:"auto",position:"sticky",top:0,height:"calc(100vh - 180px)"}}>
        <SidebarContent {...sidebarProps}/>
      </div>}

      {/* MAIN */}
      <div style={{flex:1,minWidth:0}}>

        {/* Monat-Nav (nicht im Depot-Tab) */}
        {tab!=="depot"&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:isMobile?"10px 16px":"12px 28px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
          <button onClick={()=>shiftMonth(-1)} style={{background:C.border,border:"none",color:C.text,padding:"8px 20px",borderRadius:9,cursor:"pointer",fontWeight:700}}>←</button>
          <span style={{fontWeight:700,fontSize:15}}>{fmtMonth(month)}</span>
          <button onClick={()=>shiftMonth(1)} style={{background:C.border,border:"none",color:C.text,padding:"8px 20px",borderRadius:9,cursor:"pointer",fontWeight:700}}>→</button>
        </div>}

        {/* TABS */}
        <div style={{display:"flex",background:C.card,borderBottom:`1px solid ${C.border}`,overflowX:"auto"}}>
          {[["overview","📊","Übersicht"],["list","📋","Buchungen"],["cats","📈","Kategorien"],["goals","🎯","Ziele"],["depot","💹","Depot"]].map(([id,ico,lbl])=>
            <button key={id} onClick={()=>setTab(id)} style={{flex:1,padding:"13px 4px",background:"none",border:"none",borderBottom:tab===id?`2px solid ${id==="depot"?C.blue:C.gold}`:"2px solid transparent",color:tab===id?(id==="depot"?C.blue:C.gold):C.muted,fontWeight:tab===id?700:400,fontSize:isMobile?9:12,cursor:"pointer",whiteSpace:"nowrap"}}>{ico} {lbl}</button>
          )}
        </div>

        <div style={{padding:isMobile?14:28,paddingBottom:100}}>

          {/* ── ÜBERSICHT ── */}
          {tab==="overview"&&<>
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:isMobile?10:16,marginBottom:isMobile?14:20}}>
              <StatCard label="Einnahmen" amount={inc} color={C.green} sign="+"/>
              <StatCard label="Ausgaben"  amount={exp} color={C.red}   sign="-"/>
              <StatCard label="Bilanz"    amount={Math.abs(bal)} color={bal>=0?C.green:C.red} sign={bal>=0?"+":"-"}/>
            </div>
            {sparPct!==null
              ?<div style={{background:C.card,borderRadius:14,padding:isMobile?16:22,border:`1px solid ${C.border}`,marginBottom:isMobile?14:20}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:6}}>💡 Sparquote diesen Monat</div>
                <div style={{display:"flex",alignItems:"baseline",gap:14}}>
                  <div style={{fontSize:isMobile?38:52,fontWeight:900,color:sparPct>=20?C.goldLight:sparPct>=0?C.mutedLight:C.red,letterSpacing:-2}}>{sparPct.toFixed(0)}%</div>
                  <div style={{fontSize:13,color:C.muted,lineHeight:1.6}}>{sparPct>=20?"Stark! Weiter so! 💪":sparPct>=0?"Solide – noch Luft nach oben.":"⚠️ Mehr ausgegeben als eingenommen!"}</div>
                </div>
                {bal>0&&<div style={{marginTop:10,fontSize:13,color:C.green}}>+€{fmtAmt(bal)} gespart diesen Monat</div>}
              </div>
              :<div style={{background:C.card,borderRadius:14,padding:isMobile?16:22,border:`1px solid ${C.border}`,marginBottom:isMobile?14:20,textAlign:"center"}}>
                <div style={{fontSize:36,marginBottom:8}}>📭</div>
                <div style={{color:C.muted,fontSize:14}}>Noch keine Buchungen diesen Monat</div>
              </div>}

            {/* Gesamtvermögen */}
            {depotTotal>0&&<div style={{background:"#090f1e",border:`1px solid ${C.blue}33`,borderRadius:14,padding:isMobile?14:20,marginBottom:isMobile?14:20}}>
              <div style={{fontSize:12,fontWeight:700,color:C.blue,marginBottom:12}}>💎 Gesamtvermögen</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div style={{background:C.bg,borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:9,color:C.muted,marginBottom:3}}>SPARZIELE</div>
                  <div style={{fontSize:15,fontWeight:800,color:C.gold}}>€{fmtShort(totalSaved)}</div>
                </div>
                <div style={{background:C.bg,borderRadius:10,padding:"10px 12px"}}>
                  <div style={{fontSize:9,color:C.muted,marginBottom:3}}>ETF-DEPOT</div>
                  <div style={{fontSize:15,fontWeight:800,color:C.blue}}>€{fmtShort(depotTotal)}</div>
                </div>
              </div>
              <div style={{background:C.bg,borderRadius:10,padding:"12px",textAlign:"center",border:`1px solid ${C.blue}22`}}>
                <div style={{fontSize:9,color:C.muted,marginBottom:4}}>GESAMT</div>
                <div style={{fontSize:24,fontWeight:900,color:C.gold}}>€{fmtShort(gesamtVermoegen)}</div>
              </div>
            </div>}

            <div style={{background:"#071a10",border:"1px solid #1a4020",borderRadius:14,padding:isMobile?14:20}}>
              <div style={{fontSize:12,fontWeight:700,color:"#4ade80",marginBottom:8}}>💡 Tipp</div>
              <div style={{fontSize:13,color:"#86efac",lineHeight:1.75}}>
                {bal>0?<>Diesen Monat hast du <strong style={{color:"#4ade80"}}>€{fmtAmt(bal)}</strong> übrig – verteile es auf deine Sparziele!</>:"Trage Einkommen und Ausgaben ein oder importiere per CSV."}
              </div>
            </div>
          </>}

          {/* ── BUCHUNGEN ── */}
          {tab==="list"&&<>
            {isMobile&&<div style={{display:"flex",gap:8,marginBottom:14}}>
              <button onClick={openImport} style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"12px 14px",background:"#0d1a2e",border:`1px dashed ${C.gold}55`,borderRadius:12,cursor:"pointer",color:C.gold}}>
                <span>📂</span><div style={{textAlign:"left"}}><div style={{fontWeight:700,fontSize:12}}>Importieren</div><div style={{fontSize:10,color:C.muted}}>CSV einlesen</div></div>
              </button>
              <button onClick={exportCSV} style={{flex:1,display:"flex",alignItems:"center",gap:8,padding:"12px 14px",background:"#0d1a2e",border:`1px dashed ${C.green}55`,borderRadius:12,cursor:"pointer",color:C.green}}>
                <span>💾</span><div style={{textAlign:"left"}}><div style={{fontWeight:700,fontSize:12}}>Exportieren</div><div style={{fontSize:10,color:C.muted}}>CSV speichern</div></div>
              </button>
            </div>}
            {sortedMv.length===0
              ?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}>
                <div style={{fontSize:52,marginBottom:14}}>📭</div>
                <div style={{fontWeight:600,fontSize:15}}>Noch keine Buchungen</div>
                <div style={{fontSize:12,marginTop:6}}>Manuell hinzufügen oder CSV importieren</div>
              </div>
              :<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:10}}>
                {sortedMv.map(e=><div key={e.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",gap:12,alignItems:"center"}}>
                    <div style={{fontSize:24,width:34,textAlign:"center"}}>{EMOJI[e.category]||"📝"}</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:13}}>{e.category}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:2,maxWidth:isMobile?160:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.note||e.date}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontWeight:900,fontSize:14,color:e.type==="income"?C.green:C.red,whiteSpace:"nowrap"}}>{e.type==="income"?"+":"-"}€{fmtAmt(e.amount)}</span>
                    <button onClick={()=>delEntry(e.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>✕</button>
                  </div>
                </div>)}
              </div>}
          </>}

          {/* ── KATEGORIEN ── */}
          {tab==="cats"&&(catSorted.length===0
            ?<div style={{textAlign:"center",padding:"60px 0",color:C.muted}}><div style={{fontSize:52,marginBottom:14}}>📊</div><div style={{fontWeight:600,fontSize:15}}>Noch keine Ausgaben</div></div>
            :<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:12}}>
              {catSorted.map(([cat,amt])=><div key={cat} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                  <span style={{fontWeight:700,fontSize:13}}>{EMOJI[cat]||"📝"} {cat}</span>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontWeight:900,color:C.red,fontSize:14}}>€{fmtAmt(amt)}</div>
                    <div style={{fontSize:10,color:C.muted}}>{((amt/exp)*100).toFixed(1)}%</div>
                  </div>
                </div>
                <div style={{height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${(amt/exp)*100}%`,background:"linear-gradient(90deg,#f87171,#fb9999)",borderRadius:3}}/>
                </div>
              </div>)}
            </div>
          )}

          {/* ── ZIELE ── */}
          {tab==="goals"&&<>
            {isMobile&&<div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
              <button onClick={openNew} style={{background:C.gold,border:"none",color:"#080e1a",fontSize:12,fontWeight:800,padding:"9px 16px",borderRadius:9,cursor:"pointer"}}>+ Neues Ziel</button>
            </div>}
            <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
              {goals.map(g=>{
                const p=g.target>0?Math.min((g.saved/g.target)*100,100):0;
                return<div key={g.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{fontSize:30,lineHeight:1}}>{g.icon}</div>
                      <div>
                        <div style={{fontWeight:800,fontSize:15}}>{g.name}</div>
                        <div style={{fontSize:11,color:C.muted,marginTop:3}}>{g.saved>=g.target?"🎉 Ziel erreicht!":`Noch €${Math.max(0,g.target-g.saved).toLocaleString("de-DE")} bis zum Ziel`}</div>
                      </div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>openEdit(g)} style={{background:C.border,border:"none",color:C.mutedLight,fontSize:12,padding:"6px 10px",borderRadius:8,cursor:"pointer"}}>✏️</button>
                      <button onClick={()=>delGoal(g.id)} style={{background:C.border,border:"none",color:C.red,fontSize:12,padding:"6px 10px",borderRadius:8,cursor:"pointer"}}>✕</button>
                    </div>
                  </div>
                  <div style={{height:8,background:C.border,borderRadius:4,overflow:"hidden",marginBottom:8}}>
                    <div style={{height:"100%",width:`${p}%`,background:g.color,borderRadius:4,boxShadow:`0 0 8px ${g.color}60`}}/>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:14}}>
                    <span style={{fontSize:12,color:g.color,fontWeight:800}}>€{g.saved.toLocaleString("de-DE")} gespart</span>
                    <span style={{fontSize:12,color:g.color,fontWeight:700}}>{p.toFixed(1)}%</span>
                    <span style={{fontSize:12,color:C.muted}}>Ziel: €{g.target.toLocaleString("de-DE")}</span>
                  </div>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Schnell einzahlen</div>
                  <div style={{display:"flex",gap:8}}>
                    {[50,100,200,500].map(a=><button key={a} onClick={()=>addSaved(g.id,a)} style={{flex:1,padding:"9px 0",background:C.bg,border:`1px solid ${g.color}55`,color:g.color,borderRadius:9,cursor:"pointer",fontSize:13,fontWeight:700}}>+{a}</button>)}
                  </div>
                </div>;
              })}
            </div>
          </>}

          {/* ── ETF DEPOT ── */}
          {tab==="depot"&&<>
            {/* Portfolio-Zusammenfassung */}
            {depot.length>0&&<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"repeat(4,1fr)",gap:10,marginBottom:18}}>
              <div style={{background:C.card,border:`1px solid ${C.blue}44`,borderRadius:12,padding:"14px 10px",textAlign:"center",gridColumn:isMobile?"1/-1":"auto"}}>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}}>Depotwert</div>
                <div style={{fontSize:isMobile?22:26,fontWeight:900,color:C.blue}}>€{fmtShort(depotTotal)}</div>
              </div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}}>Investiert</div>
                <div style={{fontSize:18,fontWeight:900,color:C.mutedLight}}>€{fmtShort(depotCost)}</div>
              </div>
              <div style={{background:C.card,border:`1px solid ${depotPnL>=0?C.green:C.red}44`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}}>Gewinn/Verlust</div>
                <div style={{fontSize:18,fontWeight:900,color:depotPnL>=0?C.green:C.red}}>{depotPnL>=0?"+":""}€{fmtShort(Math.abs(depotPnL))}</div>
              </div>
              <div style={{background:C.card,border:`1px solid ${depotPnLPct>=0?C.green:C.red}44`,borderRadius:12,padding:"14px 10px",textAlign:"center"}}>
                <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:1.2,marginBottom:6}}>Performance</div>
                <div style={{fontSize:18,fontWeight:900,color:depotPnLPct>=0?C.green:C.red}}>{fmtPct(depotPnLPct)}</div>
              </div>
            </div>}

            {/* Gesamtportfolio-Chart */}
            {combinedChartData&&depot.length>1&&<div style={{background:C.card,border:`1px solid ${C.blue}33`,borderRadius:16,padding:18,marginBottom:18}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <div style={{fontWeight:700,fontSize:14}}>📈 Gesamtportfolio – 3 Monate</div>
                <div style={{fontSize:11,color:C.muted}}>Alle Positionen kombiniert</div>
              </div>
              <div style={{borderRadius:8,overflow:"hidden",marginBottom:12}}>
                <MiniLineChart prices={combinedChartData} height={120}/>
              </div>
              {(()=>{
                const valid = combinedChartData.filter(v=>v!=null);
                const first = valid[0]||0;
                const last  = valid[valid.length-1]||0;
                const diff  = last-first;
                const pct   = first>0?(diff/first)*100:0;
                return <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
                  <div>
                    <div style={{fontSize:9,color:C.muted,marginBottom:3}}>VOR 3 MONATEN</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.mutedLight}}>€{fmtShort(first)}</div>
                  </div>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:13,fontWeight:800,color:diff>=0?C.green:C.red}}>
                      {diff>=0?"+":""}€{fmtShort(Math.abs(diff))}
                    </div>
                    <div style={{fontSize:11,color:diff>=0?C.green:C.red,fontWeight:600}}>{fmtPct(pct)}</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:C.muted,marginBottom:3}}>HEUTE (LIVE)</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.blue}}>€{fmtShort(last)}</div>
                  </div>
                </div>;
              })()}
            </div>}

            {/* Aktionen */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,gap:10}}>
              <div style={{fontSize:12,color:C.muted}}>
                {lastUpdated?`Kurse: ${lastUpdated} Uhr · `:""}
                {depot.length} {depot.length===1?"Position":"Positionen"}
              </div>
              <div style={{display:"flex",gap:8}}>
                {depot.length>0&&<button onClick={fetchAllPrices} disabled={Object.values(priceLoading).some(Boolean)} style={{background:C.border,border:"none",color:C.mutedLight,fontSize:12,padding:"9px 14px",borderRadius:9,cursor:"pointer",fontWeight:600}}>
                  {Object.values(priceLoading).some(Boolean)
                    ?<><span className="spin" style={{display:"inline-block",marginRight:4}}>⟳</span>Lädt…</>
                    :"⟳ Kurse aktualisieren"}
                </button>}
                <button onClick={openNewDepot} style={{background:`linear-gradient(135deg,${C.blue},#60a5fa)`,border:"none",color:"#fff",fontSize:13,padding:"9px 16px",borderRadius:9,cursor:"pointer",fontWeight:700}}>+ Position</button>
              </div>
            </div>

            {depot.length===0
              ?<div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
                <div style={{fontSize:56,marginBottom:16}}>💹</div>
                <div style={{fontWeight:700,fontSize:16,marginBottom:8,color:C.text}}>Noch keine ETFs eingetragen</div>
                <div style={{fontSize:13,marginBottom:6,lineHeight:1.8}}>Füge deine Trade Republic Sparpläne einmalig hinzu.</div>
                <div style={{fontSize:12,marginBottom:24,color:C.muted}}>Wir holen die Live-Kurse automatisch von Yahoo Finance.</div>
                <button onClick={openNewDepot} style={{background:`linear-gradient(135deg,${C.blue},#60a5fa)`,border:"none",color:"#fff",fontSize:14,padding:"13px 26px",borderRadius:11,cursor:"pointer",fontWeight:700}}>+ Erste ETF-Position hinzufügen</button>
              </div>
              :<div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:14}}>
                {depot.map(etf=>{
                  const price    = priceData[etf.ticker];
                  const isLoad   = priceLoading[etf.ticker];
                  const curVal   = (price??etf.avgPrice)*etf.units;
                  const cost     = etf.avgPrice*etf.units;
                  const pnl      = curVal-cost;
                  const pnlPct   = cost>0?(pnl/cost)*100:0;
                  return<div key={etf.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:18,overflow:"hidden"}}>
                    {/* Kopfzeile */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:14,marginBottom:3}}>{etf.name}</div>
                        <div style={{fontSize:11,color:C.blue,fontWeight:700,fontFamily:"monospace",letterSpacing:0.5}}>{etf.ticker}</div>
                      </div>
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        {isLoad&&<span className="spin" style={{color:C.blue,fontSize:16}}>⟳</span>}
                        <button onClick={()=>openEditDepot(etf)} style={{background:C.border,border:"none",color:C.mutedLight,fontSize:11,padding:"4px 8px",borderRadius:7,cursor:"pointer"}}>✏️</button>
                        <button onClick={()=>delDepotEntry(etf.id)} style={{background:C.border,border:"none",color:C.red,fontSize:11,padding:"4px 8px",borderRadius:7,cursor:"pointer"}}>✕</button>
                      </div>
                    </div>

                    {/* Chart */}
                    <div style={{borderRadius:8,overflow:"hidden",marginBottom:10,background:C.bg}}>
                      <MiniLineChart prices={chartData[etf.ticker]} height={72}/>
                    </div>

                    {/* Kurs */}
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                      <div>
                        <div style={{fontSize:9,color:C.muted,marginBottom:2}}>AKTUELLER KURS</div>
                        <div style={{fontSize:20,fontWeight:900,color:price!=null?C.text:C.muted}}>
                          {price!=null?`€${fmtAmt(price)}`:(isLoad?"…":"n/v")}
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:9,color:C.muted,marginBottom:2}}>Ø KAUFPREIS</div>
                        <div style={{fontSize:14,fontWeight:600,color:C.mutedLight}}>€{fmtAmt(etf.avgPrice)}</div>
                      </div>
                    </div>

                    {/* P&L */}
                    <div style={{background:C.bg,borderRadius:10,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontSize:9,color:C.muted,marginBottom:3}}>{etf.units} ANTEILE</div>
                        <div style={{fontSize:16,fontWeight:800,color:C.blue}}>€{fmtShort(curVal)}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:9,color:C.muted,marginBottom:3}}>GEWINN/VERLUST</div>
                        <div style={{fontSize:14,fontWeight:800,color:pnl>=0?C.green:C.red}}>{pnl>=0?"+":""}€{fmtShort(Math.abs(pnl))}</div>
                        <div style={{fontSize:11,color:pnlPct>=0?C.green:C.red,fontWeight:600}}>{fmtPct(pnlPct)}</div>
                      </div>
                    </div>
                  </div>;
                })}
              </div>
            }

            {depot.length>0&&<div style={{marginTop:20,background:"#090f1e",border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",fontSize:11,color:C.muted,lineHeight:1.8}}>
              ℹ️ Kursdaten via Yahoo Finance (15–20 Min. verzögert) · Trade Republic bietet keine öffentliche API – du trägst Positionen einmalig ein, Kurse werden automatisch abgerufen.
            </div>}
          </>}

        </div>
      </div>
    </div>

    {/* FAB Mobile */}
    {isMobile&&tab!=="goals"&&tab!=="depot"&&<button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:26,right:24,width:60,height:60,borderRadius:"50%",background:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",cursor:"pointer",fontSize:32,color:"#080e1a",fontWeight:900,boxShadow:`0 4px 28px ${C.gold}55`,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>}

    {/* Desktop Add Button */}
    {!isMobile&&tab!=="goals"&&tab!=="depot"&&<button onClick={()=>setShowAdd(true)} style={{position:"fixed",bottom:32,right:32,background:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",cursor:"pointer",fontSize:14,color:"#080e1a",fontWeight:800,boxShadow:`0 4px 28px ${C.gold}55`,padding:"14px 24px",borderRadius:14,display:"flex",alignItems:"center",gap:8}}>
      <span style={{fontSize:18}}>+</span> Buchung hinzufügen
    </button>}

    {/* ── MODALS ── */}

    {/* CSV Import */}
    {showImport&&<Overlay title="📂 CSV importieren" onClose={()=>{setShowImport(false);resetImport();}}>
      <div style={{display:"flex",gap:0,marginBottom:20,background:C.bg,borderRadius:10,padding:4}}>
        {[["upload","1. Datei"],["map","2. Spalten"],["preview","3. Vorschau"]].map(([s,lbl])=>
          <div key={s} style={{flex:1,textAlign:"center",padding:"7px 0",borderRadius:8,background:csvStep===s?C.card:"transparent",color:csvStep===s?C.gold:C.muted,fontSize:11,fontWeight:csvStep===s?700:400}}>{lbl}</div>
        )}
      </div>
      {csvStep==="upload"&&<>
        <div style={{background:"#0a1628",border:`1px solid ${C.gold}33`,borderRadius:12,padding:16,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:C.gold,marginBottom:10}}>📱 So exportierst du bei Trade Republic:</div>
          <div style={{fontSize:12,color:C.mutedLight,lineHeight:1.9}}>1. App öffnen → „Konto" tippen<br/>2. Oben rechts → „Kontoauszug"<br/>3. Zeitraum wählen → <strong style={{color:C.gold}}>„CSV exportieren"</strong></div>
        </div>
        <input ref={fileRef} type="file" accept=".csv,.txt" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileRef.current&&fileRef.current.click()} style={{width:"100%",padding:16,background:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",borderRadius:12,cursor:"pointer",fontWeight:800,fontSize:15,color:"#080e1a"}}>📁 CSV-Datei auswählen</button>
        <div style={{textAlign:"center",marginTop:12,fontSize:11,color:C.muted}}>Funktioniert mit Trade Republic, ING, DKB, Sparkasse, N26</div>
      </>}
      {csvStep==="map"&&<>
        <div style={{background:"#071a10",border:"1px solid #1a4020",borderRadius:10,padding:12,marginBottom:4,fontSize:12,color:"#86efac"}}>✅ <strong>{csvRaw.length} Transaktionen</strong> erkannt.</div>
        {[["date","📅 Datum-Spalte"],["amount","💶 Betrags-Spalte"],["note","📝 Beschreibungs-Spalte"]].map(([key,lbl])=>
          <Field key={key} label={lbl}>
            <select value={csvMap[key]} onChange={e=>setCsvMap(m=>({...m,[key]:e.target.value}))} style={IS}>
              <option value="">-- nicht verwenden --</option>
              {csvHeaders.map(h=><option key={h} value={h}>{h}{csvRaw[0]&&csvRaw[0][h]?` → z.B. "${csvRaw[0][h]}"`:""}</option>)}
            </select>
          </Field>
        )}
        <div style={{display:"flex",gap:10,marginTop:16}}>
          <button onClick={resetImport} style={{flex:1,padding:13,background:C.border,border:"none",borderRadius:10,color:C.text,cursor:"pointer",fontWeight:600}}>← Zurück</button>
          <button onClick={buildPreview} disabled={!csvMap.date||!csvMap.amount} style={{flex:2,padding:13,background:(!csvMap.date||!csvMap.amount)?C.border:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",borderRadius:10,cursor:(!csvMap.date||!csvMap.amount)?"not-allowed":"pointer",fontWeight:800,color:(!csvMap.date||!csvMap.amount)?C.muted:"#080e1a"}}>Vorschau →</button>
        </div>
      </>}
      {csvStep==="preview"&&<>
        <div style={{fontSize:12,color:C.mutedLight,marginBottom:12}}>Vorschau – Kategorien automatisch erkannt:</div>
        {csvPreview.map((e,i)=><div key={i} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <span style={{fontSize:20}}>{EMOJI[e.category]||"📝"}</span>
            <div><div style={{fontSize:12,fontWeight:600}}>{e.category}</div><div style={{fontSize:11,color:C.muted}}>{e.note||e.date}</div></div>
          </div>
          <span style={{fontWeight:800,fontSize:13,color:e.type==="income"?C.green:C.red}}>{e.type==="income"?"+":"-"}€{fmtAmt(e.amount)}</span>
        </div>)}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>setCsvStep("map")} style={{flex:1,padding:13,background:C.border,border:"none",borderRadius:10,color:C.text,cursor:"pointer",fontWeight:600}}>← Zurück</button>
          <button onClick={importAll} style={{flex:2,padding:13,background:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",borderRadius:10,cursor:"pointer",fontWeight:800,color:"#080e1a"}}>✓ Alle {csvRaw.length} importieren</button>
        </div>
      </>}
    </Overlay>}

    {/* Buchung hinzufügen */}
    {showAdd&&<Overlay title="Buchung hinzufügen" onClose={()=>setShowAdd(false)}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        {["expense","income"].map(t=><button key={t} onClick={()=>setForm(f=>({...f,type:t,category:""}))} style={{padding:"12px 0",borderRadius:10,border:`2px solid ${form.type===t?(t==="expense"?C.red:C.green):C.border}`,background:form.type===t?(t==="expense"?"#200d0d":"#0d200d"):"transparent",color:form.type===t?(t==="expense"?C.red:C.green):C.muted,cursor:"pointer",fontWeight:700,fontSize:13}}>{t==="expense"?"📤 Ausgabe":"📥 Einnahme"}</button>)}
      </div>
      <Field label="Betrag (€)"><input type="number" inputMode="decimal" placeholder="0.00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} style={IS}/></Field>
      <Field label="Kategorie">
        <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))} style={{...IS,color:form.category?C.text:C.muted}}>
          <option value="">-- Kategorie wählen --</option>
          {(form.type==="income"?INCOME_CAT:EXPENSE_CAT).map(c=><option key={c} value={c}>{EMOJI[c]?`${EMOJI[c]} ${c}`:c}</option>)}
        </select>
      </Field>
      <Field label="Notiz (optional)"><input type="text" placeholder="z.B. Rewe, Tankstelle…" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} style={IS}/></Field>
      <Field label="Datum"><input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} style={IS}/></Field>
      <button onClick={addEntry} disabled={!form.amount||!form.category} style={{width:"100%",padding:15,marginTop:14,background:(!form.amount||!form.category)?C.border:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",borderRadius:12,cursor:(!form.amount||!form.category)?"not-allowed":"pointer",fontWeight:800,fontSize:15,color:(!form.amount||!form.category)?C.muted:"#080e1a"}}>✓ Speichern</button>
    </Overlay>}

    {/* Ziel Modal */}
    {showGoalDlg&&<Overlay title={editId?"Ziel bearbeiten":"Neues Sparziel"} onClose={()=>setShowGoalDlg(false)}>
      <Field label="Icon"><div style={{display:"flex",flexWrap:"wrap",gap:8,marginTop:4}}>{GOAL_ICONS.map(ic=><button key={ic} onClick={()=>setGForm(f=>({...f,icon:ic}))} style={{fontSize:22,padding:"6px 8px",borderRadius:9,border:`2px solid ${gForm.icon===ic?C.gold:C.border}`,background:gForm.icon===ic?"#1a150a":C.bg,cursor:"pointer"}}>{ic}</button>)}</div></Field>
      <Field label="Farbe"><div style={{display:"flex",gap:10,flexWrap:"wrap",marginTop:4}}>{GOAL_COLORS.map(col=><button key={col} onClick={()=>setGForm(f=>({...f,color:col}))} style={{width:30,height:30,borderRadius:"50%",background:col,border:`3px solid ${gForm.color===col?C.text:"transparent"}`,cursor:"pointer"}}/>)}</div></Field>
      <Field label="Name"><input type="text" placeholder="z.B. Urlaub, Auto…" value={gForm.name} onChange={e=>setGForm(f=>({...f,name:e.target.value}))} style={IS}/></Field>
      <Field label="Zielbetrag (€)"><input type="number" inputMode="decimal" placeholder="z.B. 10000" value={gForm.target} onChange={e=>setGForm(f=>({...f,target:e.target.value}))} style={IS}/></Field>
      <Field label="Bereits gespart (€)"><input type="number" inputMode="decimal" placeholder="0" value={gForm.saved} onChange={e=>setGForm(f=>({...f,saved:e.target.value}))} style={IS}/></Field>
      <button onClick={saveGoal} disabled={!gForm.name||!gForm.target} style={{width:"100%",padding:15,marginTop:14,background:(!gForm.name||!gForm.target)?C.border:`linear-gradient(135deg,${C.gold},${C.goldLight})`,border:"none",borderRadius:12,cursor:(!gForm.name||!gForm.target)?"not-allowed":"pointer",fontWeight:800,fontSize:15,color:(!gForm.name||!gForm.target)?C.muted:"#080e1a"}}>{editId?"✓ Speichern":"✓ Erstellen"}</button>
    </Overlay>}

    {/* ETF Depot Modal */}
    {showDepotDlg&&<Overlay title={editDepotId?"ETF bearbeiten":"ETF-Position hinzufügen"} onClose={()=>setShowDepotDlg(false)}>
      <div style={{background:"#090f1e",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.mutedLight,lineHeight:1.8}}>
        💡 Gib den Yahoo Finance Ticker ein — z.B. <strong style={{color:C.blue,fontFamily:"monospace"}}>EUNL.DE</strong> für iShares MSCI World auf XETRA
      </div>
      <div style={{marginTop:14}}>
        <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1.2,marginBottom:8}}>Häufige ETFs</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {ETF_PRESETS.map(p=><button key={p.ticker} onClick={()=>setDForm(f=>({...f,name:f.name||p.name,ticker:p.ticker}))} style={{padding:"5px 10px",background:dForm.ticker===p.ticker?`${C.blue}22`:C.bg,border:`1px solid ${dForm.ticker===p.ticker?C.blue:C.border}`,borderRadius:8,color:dForm.ticker===p.ticker?C.blue:C.mutedLight,fontSize:11,cursor:"pointer",fontWeight:dForm.ticker===p.ticker?700:400}}>
            {p.ticker}
          </button>)}
        </div>
      </div>
      <Field label="Name des ETFs">
        <input type="text" placeholder="z.B. iShares MSCI World" value={dForm.name} onChange={e=>setDForm(f=>({...f,name:e.target.value}))} style={IS}/>
      </Field>
      <Field label="Ticker-Symbol (Yahoo Finance)">
        <input type="text" placeholder="z.B. EUNL.DE" value={dForm.ticker} onChange={e=>setDForm(f=>({...f,ticker:e.target.value.toUpperCase()}))} style={{...IS,fontFamily:"monospace",letterSpacing:1}}/>
      </Field>
      <Field label="Anzahl Anteile">
        <input type="number" inputMode="decimal" placeholder="z.B. 25.5" value={dForm.units} onChange={e=>setDForm(f=>({...f,units:e.target.value}))} style={IS}/>
      </Field>
      <Field label="Durchschnittlicher Kaufpreis (€)">
        <input type="number" inputMode="decimal" placeholder="z.B. 73.20" value={dForm.avgPrice} onChange={e=>setDForm(f=>({...f,avgPrice:e.target.value}))} style={IS}/>
      </Field>
      <button onClick={saveDepotEntry} disabled={!dForm.name||!dForm.ticker||!dForm.units||!dForm.avgPrice} style={{width:"100%",padding:15,marginTop:14,background:(!dForm.name||!dForm.ticker||!dForm.units||!dForm.avgPrice)?C.border:`linear-gradient(135deg,${C.blue},#60a5fa)`,border:"none",borderRadius:12,cursor:"pointer",fontWeight:800,fontSize:15,color:(!dForm.name||!dForm.ticker||!dForm.units||!dForm.avgPrice)?C.muted:"#fff"}}>
        {editDepotId?"✓ Speichern":"✓ Hinzufügen & Kurs laden"}
      </button>
    </Overlay>}

    {/* LOGIN MODAL */}
    {showLoginModal&&<Overlay title="Anmelden um fortzufahren" onClose={()=>setShowLoginModal(false)}>
      <div style={{textAlign:"center",padding:"10px 0 20px"}}>
        <div style={{fontSize:44,marginBottom:12}}>🔒</div>
        <div style={{fontSize:14,color:C.muted,marginBottom:28,lineHeight:1.7}}>
          Melde dich an um Buchungen zu speichern und deine Daten auf allen Geräten zu nutzen.
        </div>
        {/* GitHub */}
        <button onClick={()=>{setShowLoginModal(false);sb.auth.signInWithOAuth({provider:'github',options:{redirectTo:'https://finanzen-auf-einen-blick.vercel.app'}});}}
          style={{width:"100%",background:"#24292e",color:"#fff",border:"none",padding:"13px 24px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
          Mit GitHub anmelden
        </button>
        {/* Google */}
        <button onClick={()=>{setShowLoginModal(false);sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://finanzen-auf-einen-blick.vercel.app'}});}}
          style={{width:"100%",background:"#fff",color:"#1f1f1f",border:"1px solid #dadce0",padding:"13px 24px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:10}}>
          <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Mit Google anmelden
        </button>
        {/* Apple */}
        <button onClick={()=>{setShowLoginModal(false);sb.auth.signInWithOAuth({provider:'apple',options:{redirectTo:'https://finanzen-auf-einen-blick.vercel.app'}});}}
          style={{width:"100%",background:"#000",color:"#fff",border:"none",padding:"13px 24px",borderRadius:12,fontSize:14,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:4}}>
          <svg width="16" height="18" viewBox="0 0 814 1000" fill="white"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-47.4-148.2-108.5C27.5 743.3 0 662.6 0 583.7c0-194.3 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg>
          Mit Apple anmelden
        </button>
        <div style={{fontSize:11,color:C.muted,marginTop:12}}>Kostenlos · Daten sicher in der Cloud</div>
      </div>
    </Overlay>}

    {/* Mobile Drawer Overlay */}
    {isMobile&&showDrawer&&<div onClick={()=>setShowDrawer(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:1050}}/>}

    {/* Mobile Drawer */}
    {isMobile&&<div style={{position:"fixed",top:0,left:0,height:"100%",width:280,background:"#0b1422",zIndex:1051,transform:showDrawer?"translateX(0)":"translateX(-100%)",transition:"transform 0.28s cubic-bezier(0.4,0,0.2,1)",borderRight:`1px solid ${C.border}`,display:"flex",flexDirection:"column",overflowY:"auto"}}>
      <div style={{padding:"20px 18px 14px",background:C.card,borderBottom:`1px solid ${C.border}`,flexShrink:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:9,color:C.gold,letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>Mein</div><div style={{fontSize:17,fontWeight:900}}>Haushaltsbuch</div></div>
        <button onClick={()=>setShowDrawer(false)} style={{background:"none",border:"none",color:C.muted,fontSize:24,cursor:"pointer"}}>×</button>
      </div>
      <SidebarContent {...sidebarProps}/>
    </div>}

  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
